# Desenvolvimento local: PostgreSQL + Redis (alinhado com backend/.env.example)
services:
  postgres:
    image: postgres:16-alpine
    container_name: rna-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: rna_backend
    volumes:
      - rna_pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: rna-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  rna_pgdata:
